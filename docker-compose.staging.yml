# Staging stack. Structurally identical to docker-compose.yml; the distinct
# top-level project name plus a staging stack.env (different SERVICE_CONTAINER_NAME,
# SERVICE_PORT, POSTGRES_CONTAINER_NAME, POSTGRES_PORT) let it run side by side
# with prod in Portainer without name/port collisions.
name: events-staging

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - events-network

  events:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SERVICE_CONTAINER_NAME}
    env_file:
      - stack.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_CONTAINER_NAME}:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "${SERVICE_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - events-network
      - financer-transactions_transactions-network

volumes:
  postgres_data:

networks:
  events-network:
    driver: bridge
  financer-transactions_transactions-network:
    external: true
